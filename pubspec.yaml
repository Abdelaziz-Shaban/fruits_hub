name: fruit_hub
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_sign_in: ^6.2.1
  flutter_svg: ^2.3.0
  intl: ^0.20.2
  intl_utils: ^2.8.7
  dots_indicator: ^4.0.1
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.5.5
  firebase_core: ^4.9.0
  dartz: ^0.10.1
  firebase_auth: ^6.5.2
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  modal_progress_hud_nsn: ^0.5.1
  flutter_facebook_auth: ^7.1.8
  cloud_firestore: ^6.6.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  flutter_gen: ^5.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

# 💡 الإعدادات السحرية للـ flutter_gen عشان ترمي الملف في الـ core بالظبط 👇
flutter_gen:
  output: lib/core/utils/
  class_name: AppAssets